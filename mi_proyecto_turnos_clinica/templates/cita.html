{% extends "base.html" %}

{% block content %}

<h2>Solicitar Cita Médica</h2>

<form method="POST">

<label>Nombre</label><br>
<input type="text" name="nombre" required><br><br>

<label>Teléfono</label><br>

<button type="submit">Guardar Cita</button>

</form>

<br>
<a href="/">Volver al inicio</a>

{% endblock %}
